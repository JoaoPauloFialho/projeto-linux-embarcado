<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoramento BeagleBone</title>
    
    <link rel="stylesheet" href="index.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <div class="container">
        <h1>Painel de Controle - DS18B20</h1>
        
        <div class="temp-atual">
            <span id="valorTemperatura">--</span> °C
        </div>

        <div class="grafico-wrapper">
            <canvas id="meuGrafico"></canvas>
        </div>
    </div>

    <hr style="margin: 30px 0; border: 1px solid #ddd;">
        
    <h2>Configuração do Alarme</h2>
    <div class="alarme-container">
        <label for="sliderAlarme">Disparar acima de: <span id="valorAlarme">30.0</span> °C</label>
        <br>
        <input type="range" id="sliderAlarme" min="15" max="50" step="0.5" value="30" style="width: 80%; margin-top: 15px;">
    </div>
    <hr style="margin: 30px 0; border: 1px solid #ddd;">
        <h2>Relatório de Dados</h2>
        <button id="btnBaixarCsv" class="btn-download">Baixar Histórico (.CSV)</button>
    <script src="index.js" defer></script>
</body>
</html>
